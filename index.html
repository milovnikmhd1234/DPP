<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>DPP Budějovická - Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --red: #d32f2f; --dark: #212121; }
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: var(--red); color: white; padding: 15px; text-align: center; }
        nav { background: var(--dark); display: flex; justify-content: center; }
        nav a { color: white; padding: 15px 20px; text-decoration: none; }
        nav a:hover { background: #444; }
        nav a.active { border-bottom: 4px solid white; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        #map { height: 500px; width: 100%; border-radius: 8px; border: 2px solid #ccc; }
    </style>
</head>
<body>
    <header><h1>DPP Budějovická - Centrální Mapa</h1></header>
    <nav>
        <a href="index.html" class="active">Mapa</a>
        <a href="Vozovna.html">Vozovna</a>
        <a href="JizdniRady.html">Jízdní řády</a>
    </nav>
    <div class="container">
        <div id="map"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([50.0443, 14.442], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var stops = [
            { n: "Budějovická", p: [50.0443, 14.4485] },
            { n: "Pankrác", p: [50.0511, 14.4393] },
            { n: "Zelený Pruh", p: [50.0405, 14.4325] },
            { n: "Kavčí Hory", p: [50.0505, 14.4289] }
        ];
        stops.forEach(s => L.marker(s.p).addTo(map).bindPopup(s.n));
    </script>
</body>
</html>
